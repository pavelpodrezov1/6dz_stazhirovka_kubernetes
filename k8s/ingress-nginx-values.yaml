controller:
  replicaCount: 2

  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  ingressClassResource:
    name: nginx
    enabled: true
    default: false

  ingressClass: nginx

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
