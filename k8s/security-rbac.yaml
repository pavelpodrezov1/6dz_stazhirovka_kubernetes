apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: homework
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: homework
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-config-reader
  namespace: homework
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["backend-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["backend", "postgres"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-config-reader
  namespace: homework
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: homework
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-config-reader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-config-reader
  namespace: homework
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["frontend-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["frontend", "backend"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-config-reader
  namespace: homework
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: homework
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: frontend-config-reader
