name: Build backend images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/build-backend.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - version: v1
            message: initial release
          - version: v2
            message: rolling update completed

    steps:
      - name: Получение файлов репозитория
        uses: actions/checkout@v6

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Авторизация в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка и публикация backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/pavelpodrezov1/k8s-homework-backend:${{ matrix.version }}
          build-args: |
            APP_VERSION=${{ matrix.version }}
            RELEASE_MESSAGE=${{ matrix.message }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
